name: Build FCL Elite

on:
  workflow_dispatch: # Чтобы ты мог запустить кнопку вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Важно для FCL, так как там есть зависимости

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build APK
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
        # Собираем конкретно модуль лаунчера
        run: ./gradlew :FCLauncher:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FCL-Elite-Build
          path: "**/*.apk"


