name: Build FCL Elite

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build All APKs
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
        # Собираем всё сразу, чтобы не промахнуться с модулем
        run: ./gradlew assembleDebug

      - name: Check Created Files (Debug)
        # Эта команда покажет в логах, где именно лежат APK
        run: find . -name "*.apk"

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: FCL-Elite-Package
          # Ищем во всех папках репозитория
          path: "**/*.apk"
